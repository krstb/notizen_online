<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notizen Online - Sicher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        html { background-color: #000000 !important; overscroll-behavior-y: none; }
        body { font-family: 'Inter', sans-serif; background-color: #e0f7fa !important; }
        textarea { resize: none !important; }
        .note-text-container { overflow-wrap: anywhere; word-break: normal; white-space: pre-wrap; display: -webkit-box; -webkit-line-clamp: 12; -webkit-box-orient: vertical; overflow: hidden; }
        .btn-action, .btn-login { font-size: 11px; font-weight: 600; border-radius: 8px; transition: all 0.2s; height: 32px; display: flex; align-items: center; justify-content: center; }
        .btn-login { padding: 0 20px; }
        #appContent:not(.hidden) { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-[#e0f7fa] min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-4 md:p-5 mt-0.5">
        <h1 class="text-lg font-bold text-center text-slate-800 mb-3">Notizen Online</h1>

        <div id="authPanelTop" class="text-center mb-2">
            <button id="loginBtn" class="bg-cyan-600 text-white btn-login mx-auto hover:bg-cyan-700 active:scale-95 shadow-sm hidden">
                Login mit Google
            </button>
        </div>

        <div id="appContent" class="hidden">
            <form id="noteForm" class="flex flex-col gap-2 mb-4">
                <textarea id="noteInput" placeholder="Neue Notiz..." rows="2" class="w-full p-2 rounded-lg border-2 border-slate-200 focus:outline-none focus:border-cyan-500 text-sm shadow-sm"></textarea>
                <div class="flex gap-2 items-center">
                    <select id="priorityInput" class="flex-1 h-[32px] p-1 rounded-lg border-2 border-slate-200 text-sm bg-white focus:outline-none">
                        <option value="1">Niedrig</option>
                        <option value="2">Mittel</option>
                        <option value="3">Hoch</option>
                    </select>
                    <button type="submit" class="bg-cyan-600 text-white btn-action px-4 shadow-sm hover:bg-cyan-700">Hinzufügen</button>
                </div>
            </form>
            <div id="notesContainer" class="space-y-2">
                <p id="loadingMessage" class="text-center text-slate-400 text-xs italic py-2">Lade Daten...</p>
            </div>
            <div id="authFooter" class="mt-6 pt-2 border-t border-slate-100 text-center flex justify-center gap-4">
                <button id="exportCsvBtn" class="text-slate-400 text-[10px] hover:text-slate-600">CSV Export</button>
                <button id="logoutBtn" class="text-red-300 text-[10px] hover:text-red-500">Abmelden</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

        let auth, db, currentUserId = null, currentNotes = [], unsubscribeNotes = null;
        const provider = new GoogleAuthProvider();
        const priorityColors = { '3': 'bg-red-500', '2': 'bg-yellow-400', '1': 'bg-green-500' };

        const loginBtn = document.getElementById('loginBtn');
        const appContent = document.getElementById('appContent');
        const notesContainer = document.getElementById('notesContainer');

        async function getSecureApiKey() {
            try {
                const response = await fetch('https://get-api-key-570048086764.europe-west3.run.app');
                if (!response.ok) throw new Error('API Key Request failed');
                const data = await response.json();
                return data.apiKey;
            } catch (error) {
                console.error("Auth-Error:", error);
                document.getElementById('loadingMessage').innerText = "Verbindungsfehler zur Sicherheits-API.";
                // Trotz Fehler Login-Button zeigen, damit User merkt, dass etwas passiert
                loginBtn.classList.remove('hidden');
                return null;
            }
        }

        async function initFirebase() {
            const key = await getSecureApiKey();
            if (!key) return;

            const firebaseConfig = {
                apiKey: key,
                authDomain: "kalender-91d50.firebaseapp.com",
                projectId: "kalender-91d50",
                storageBucket: "kalender-91d50.appspot.com",
                messagingSenderId: "774945115160",
                appId: "1:774945115160:web:95f00e9603014f305c43f7"
            };

            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            setupActions();

            onAuthStateChanged(auth, user => {
                if (user) {
                    currentUserId = user.uid;
                    appContent.classList.remove('hidden');
                    loginBtn.classList.add('hidden');
                    startListening(user.uid);
                } else {
                    appContent.classList.add('hidden');
                    loginBtn.classList.remove('hidden');
                }
            });
        }

        function startListening(uid) {
            const q = query(collection(db, `notes/${uid}/userNotes`), orderBy("priority", "desc"), orderBy("text", "asc"));
            if (unsubscribeNotes) unsubscribeNotes();
            unsubscribeNotes = onSnapshot(q, s => {
                currentNotes = s.docs.map(d => ({id: d.id, ...d.data()}));
                renderNotesUI(currentNotes);
            });
        }

        const renderNotesUI = (notes) => {
            notesContainer.innerHTML = notes.length ? '' : '<p class="text-center text-slate-400 text-xs italic py-4">Keine Notizen.</p>';
            notes.forEach(note => {
                const el = document.createElement('div');
                el.className = 'note-item flex items-center justify-between p-3 bg-white rounded-xl border border-slate-100 shadow-sm mb-2';
                el.dataset.id = note.id;
                el.innerHTML = `<div class="flex flex-1 items-start"><span class="w-2.5 h-2.5 rounded-full mr-2.5 mt-1.5 ${priorityColors[note.priority]}"></span><p class="text-sm note-text-container">${note.text}</p></div>`;
                notesContainer.appendChild(el);
            });
        };

        function setupActions() {
            loginBtn.onclick = async () => {
                try {
                    await signInWithPopup(auth, provider);
                } catch (e) {
                    alert("Login fehlgeschlagen: " + e.message);
                }
            };
            document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
            document.getElementById('noteForm').onsubmit = async (e) => {
                e.preventDefault();
                const text = document.getElementById('noteInput').value.trim();
                if (text && currentUserId) {
                    await addDoc(collection(db, `notes/${currentUserId}/userNotes`), {
                        text, priority: document.getElementById('priorityInput').value, createdAt: serverTimestamp()
                    });
                    document.getElementById('noteInput').value = '';
                }
            };
        }

        initFirebase();
    </script>
</body>
</html>
